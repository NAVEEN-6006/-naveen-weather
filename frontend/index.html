<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="google-site-verification" content="8V1EmU8P-21CDUIShf5d4gOqcm1VZoEjMUXAaN-LkTc" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── SEO ──────────────────────────────────────────────────── -->
  <title>Naveen Weather — Real-Time Weather for Any City</title>
  <meta name="description" content="Get real-time weather for any city worldwide. Temperature, humidity, wind speed, sunrise, sunset, UV index and more. Fast, accurate, beautiful." />
  <meta name="keywords" content="weather, forecast, temperature, humidity, wind, rain, sunny, Naveen Weather" />
  <meta name="author" content="Naveen" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://naveen-weather.vercel.app/" />

  <!-- ── Open Graph (WhatsApp, Facebook, LinkedIn previews) ──── -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://naveen-weather.vercel.app/" />
  <meta property="og:title"       content="Naveen Weather — Real-Time Weather for Any City" />
  <meta property="og:description" content="Search real-time weather for any city. Temperature, humidity, wind, sunrise, sunset and more." />
  <meta property="og:image"       content="https://naveen-weather.vercel.app/assets/og-image.png" />

  <!-- ── Twitter Card ─────────────────────────────────────────── -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Naveen Weather — Real-Time Weather for Any City" />
  <meta name="twitter:description" content="Search real-time weather for any city worldwide." />
  <meta name="twitter:image"       content="https://naveen-weather.vercel.app/assets/og-image.png" />

  <!-- ── Favicon ──────────────────────────────────────────────── -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>" />

  <!-- ── Fonts ────────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- ── Stylesheet ───────────────────────────────────────────── -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div class="app-wrapper" role="main">

    <!-- ── Header ──────────────────────────────────────────────── -->
    <header class="app-header">
      <div class="header-top">
        <div>
          <h1 class="app-title">🌤️ Naveen Weather</h1>
          <p class="app-subtitle">Real-time weather for any city in the world</p>
        </div>
        <!-- Unit Toggle -->
        <div class="unit-toggle" role="group" aria-label="Temperature unit">
          <button id="btnCelsius"   class="unit-btn active" aria-pressed="true"  title="Switch to Celsius">°C</button>
          <button id="btnFahrenheit" class="unit-btn"       aria-pressed="false" title="Switch to Fahrenheit">°F</button>
        </div>
      </div>
    </header>

    <!-- ── Search ──────────────────────────────────────────────── -->
    <section class="search-section" aria-label="City search">
      <div class="search-bar" role="search">
        <label for="cityInput" class="sr-only">Enter city name</label>
        <input
          type="search"
          id="cityInput"
          class="search-input"
          placeholder="Search for a city..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="words"
          spellcheck="false"
          aria-label="City name"
          maxlength="100"
        />
        <button id="searchBtn" class="search-btn" aria-label="Search weather for entered city">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
            aria-hidden="true" focusable="false">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>

      <!-- Current Location Button -->
      <button id="locationBtn" class="location-btn" aria-label="Use my current location">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M1 12h4M19 12h4"/>
        </svg>
        Use my location
      </button>
    </section>

    <!-- ── Recent Searches ─────────────────────────────────────── -->
    <section id="recentSection" class="recent-section hidden" aria-label="Recent searches">
      <div class="recent-header">
        <span class="recent-title">Recent</span>
        <button id="clearHistoryBtn" class="clear-btn" aria-label="Clear search history">Clear</button>
      </div>
      <div id="recentList" class="recent-list" role="list"></div>
    </section>

    <!-- ── Error Card ───────────────────────────────────────────── -->
    <div id="errorCard" class="error-card hidden" role="alert" aria-live="assertive">
      <span id="errorIcon"    class="error-card__icon">⚠️</span>
      <p    id="errorTitle"   class="error-card__title">Something went wrong</p>
      <p    id="errorMessage" class="error-card__message">Please try again.</p>
    </div>

    <!-- ── Weather Card ─────────────────────────────────────────── -->
    <section id="weatherCard" class="weather-card hidden" aria-label="Weather information" aria-live="polite">

      <!-- Skeleton Loader (shown while fetching) -->
      <div id="skeletonLoader" class="skeleton-wrapper hidden" aria-hidden="true">
        <div class="skeleton skeleton-location"></div>
        <div class="skeleton skeleton-temp"></div>
        <div class="skeleton skeleton-desc"></div>
        <div class="skeleton-details">
          <div class="skeleton skeleton-detail"></div>
          <div class="skeleton skeleton-detail"></div>
          <div class="skeleton skeleton-detail"></div>
        </div>
      </div>

      <!-- Weather Content -->
      <div id="weatherContent" class="weather-content hidden">

        <!-- Location -->
        <div class="weather-location">
          <div class="location-text">
            <h2 id="cityName" class="city-name">--</h2>
            <p id="weatherDate" class="weather-date">--</p>
          </div>
          <div class="location-right">
            <span id="countryName" class="country-badge">--</span>
            <button id="favBtn" class="fav-btn" aria-label="Add to favourites" title="Add to favourites">☆</button>
          </div>
        </div>

        <!-- Main: Icon + Temp -->
        <div class="weather-main">
          <img id="weatherIcon" class="weather-icon" src="" alt="" width="90" height="90" loading="lazy" />
          <div class="temperature-block">
            <p id="temperature" class="temperature">--°</p>
            <p id="weatherDescription" class="weather-description">--</p>
          </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid" role="list">

          <div class="stat-item" role="listitem">
            <span class="stat-icon" aria-hidden="true">💧</span>
            <div class="stat-text">
              <p class="stat-label">Humidity</p>
              <p id="humidity" class="stat-value">--</p>
            </div>
          </div>

          <div class="stat-item" role="listitem">
            <span class="stat-icon" aria-hidden="true">💨</span>
            <div class="stat-text">
              <p class="stat-label">Wind</p>
              <p id="windSpeed" class="stat-value">--</p>
            </div>
          </div>

          <div class="stat-item" role="listitem">
            <span class="stat-icon" aria-hidden="true">🌡️</span>
            <div class="stat-text">
              <p class="stat-label">Feels Like</p>
              <p id="feelsLike" class="stat-value">--</p>
            </div>
          </div>

          <div class="stat-item" role="listitem">
            <span class="stat-icon" aria-hidden="true">👁️</span>
            <div class="stat-text">
              <p class="stat-label">Visibility</p>
              <p id="visibility" class="stat-value">--</p>
            </div>
          </div>

          <div class="stat-item" role="listitem">
            <span class="stat-icon" aria-hidden="true">🔽</span>
            <div class="stat-text">
              <p class="stat-label">Pressure</p>
              <p id="pressure" class="stat-value">--</p>
            </div>
          </div>

          <div class="stat-item" role="listitem">
            <span class="stat-icon" aria-hidden="true">🧭</span>
            <div class="stat-text">
              <p class="stat-label">Wind Dir.</p>
              <p id="windDirection" class="stat-value">--</p>
            </div>
          </div>

        </div>

        <!-- Sun Times -->
        <div class="sun-row">
          <div class="sun-item">
            <span class="sun-icon" aria-hidden="true">🌅</span>
            <div>
              <p class="stat-label">Sunrise</p>
              <p id="sunrise" class="stat-value">--</p>
            </div>
          </div>
          <div class="sun-divider" aria-hidden="true"></div>
          <div class="sun-item">
            <span class="sun-icon" aria-hidden="true">🌇</span>
            <div>
              <p class="stat-label">Sunset</p>
              <p id="sunset" class="stat-value">--</p>
            </div>
          </div>
        </div>

      </div>
      <!-- end #weatherContent -->
    </section>

    <!-- ── Favourites ───────────────────────────────────────────── -->
    <section id="favSection" class="fav-section hidden" aria-label="Favourite cities">
      <div class="recent-header">
        <span class="recent-title">⭐ Favourites</span>
      </div>
      <div id="favList" class="recent-list" role="list"></div>
    </section>

  </div>
  <!-- end .app-wrapper -->

  <script src="js/app.js"></script>
</body>
</html>
